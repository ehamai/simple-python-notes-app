<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Notes</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
:root {
  --bg-primary: #1a1207;
  --bg-secondary: #2d1f0d;
  --bg-card: #3d2a12;
  --accent: #ff8c00;
  --accent-hover: #ffa033;
  --text-primary: #fff5e6;
  --text-secondary: #c9a875;
  --border: #5c421f;
  --success: #ff8c00;
  --gradient: linear-gradient(135deg, #ff6b00 0%, #ff8c00 50%, #ffb347 100%);
}
* { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  margin: 0; padding: 20px;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
}
.app { max-width: 720px; margin: 0 auto; }
header { margin-bottom: 24px; text-align: center; }
header h1 {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 2.5rem; margin-bottom: 8px;
}
header p { color: var(--text-secondary); margin: 0; }
.ai-badge {
  font-size: .7rem; padding: 4px 10px; border-radius: 12px;
  margin-left: 8px; vertical-align: middle;
}
.ai-badge.enabled { background: var(--success); color: #000; }
.ai-badge.disabled { background: var(--border); color: var(--text-secondary); }
.note-form {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.note-form input, .note-form textarea {
  width: 100%; margin-bottom: 12px; padding: 12px 16px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary);
  font-family: inherit; font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.note-form input:focus, .note-form textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
}
.note-form textarea { height: 100px; resize: vertical; }
.btn {
  cursor: pointer; padding: 10px 18px;
  background: var(--accent); color: white; border: none;
  border-radius: 8px; font-weight: 600; font-size: 0.9rem;
  transition: background 0.2s, transform 0.1s;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.note-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
.note-card h3 { margin: 0 0 4px; color: var(--text-primary); }
.note-card .content { white-space: pre-wrap; margin: 12px 0; color: var(--text-secondary); line-height: 1.6; }
.note-card .meta { font-size: .8rem; color: var(--text-secondary); opacity: 0.7; }
.note-card .actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.note-card .actions .btn {
  background: var(--bg-secondary); color: var(--text-primary);
  padding: 8px 14px; font-size: 0.85rem;
}
.note-card .actions .btn:hover { background: var(--accent); }
.note-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
.header-btns { display: flex; gap: 6px; }
.header-btns .btn { background: transparent; border: 1px solid var(--border); padding: 6px 12px; font-size: 0.8rem; }
.header-btns .btn:hover { background: var(--accent); border-color: var(--accent); }
.ai-result {
  margin-top: 16px; background: var(--bg-secondary);
  border: 1px solid var(--border); border-left: 3px solid var(--accent);
  border-radius: 8px; padding: 16px;
}
.ai-result h4 { margin: 0 0 8px; color: var(--accent); text-transform: capitalize; }
.ai-result pre { white-space: pre-wrap; font-family: inherit; margin: 0; line-height: 1.5; color: var(--text-secondary); }
.edit-form input, .edit-form textarea {
  width: 100%; margin-bottom: 10px; padding: 10px 14px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); font-family: inherit;
}
.edit-form textarea { height: 80px; }
.edit-actions { display: flex; gap: 8px; }
.spinner { display: inline-block; color: var(--accent); }
.spinner::after { content: "⏳ Analyzing..."; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Smart Notes <span id="ai-badge" class="ai-badge disabled">AI Mock</span></h1>
    <p>Create notes and use AI to summarize, extract tasks, or analyze sentiment</p>
  </header>

  <form class="note-form" id="note-form">
    <input id="note-title" placeholder="Note title…" />
    <textarea id="note-content" placeholder="Write your note here…"></textarea>
    <div class="form-actions">
      <button class="btn" type="submit">Add Note</button>
    </div>
  </form>

  <div id="note-list" class="note-list"></div>
</div>

<script>
const API = '/api';
const noteList = document.getElementById('note-list');
const form = document.getElementById('note-form');
const titleInput = document.getElementById('note-title');
const contentInput = document.getElementById('note-content');
const aiBadge = document.getElementById('ai-badge');

// Check AI status
fetch(`${API}/health`).then(r => r.json()).then(d => {
  if (d.ai_enabled) { aiBadge.className = 'ai-badge enabled'; aiBadge.textContent = 'AI ON'; }
}).catch(() => {});

// Load notes
async function loadNotes() {
  try {
    const res = await fetch(`${API}/notes`);
    const notes = await res.json();
    if (notes.length === 0) {
      noteList.innerHTML = '<p>No notes yet. Create one above!</p>';
      return;
    }
    noteList.innerHTML = notes.map(n => noteCard(n)).join('');
  } catch (e) {
    noteList.innerHTML = '<div class="empty-state"><p>Failed to load notes.</p></div>';
  }
}

function noteCard(n) {
  const date = new Date(n.created_at).toLocaleString();
  return `<div class="note-card" id="note-${n.id}">
    <div class="note-card-header">
      <h3>${esc(n.title)}</h3>
      <div class="header-btns">
        <button class="btn" onclick="startEdit('${n.id}')">Edit</button>
        <button class="btn" onclick="delNote('${n.id}')">Delete</button>
      </div>
    </div>
    <div class="meta">${date}</div>
    <div class="content">${esc(n.content)}</div>
    <div class="actions">
      <button class="btn" onclick="aiAction('${n.id}','summarize',this)">Summarize</button>
      <button class="btn" onclick="aiAction('${n.id}','action_items',this)">Action Items</button>
      <button class="btn" onclick="aiAction('${n.id}','sentiment',this)">Sentiment</button>
    </div>
    <div id="ai-${n.id}"></div>
  </div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Create note
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();
  if (!title || !content) return;
  await fetch(`${API}/notes`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content })
  });
  titleInput.value = ''; contentInput.value = '';
  loadNotes();
});

// Delete note
async function delNote(id) {
  await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
  loadNotes();
}

// Edit note
async function startEdit(id) {
  const res = await fetch(`${API}/notes/${id}`);
  const n = await res.json();
  const card = document.getElementById(`note-${id}`);
  card.innerHTML = `<div class="edit-form">
    <input id="edit-title-${id}" value="${esc(n.title)}" />
    <textarea id="edit-content-${id}">${esc(n.content)}</textarea>
    <div class="edit-actions">
      <button class="btn" onclick="saveEdit('${id}')">Save</button>
      <button class="btn" onclick="loadNotes()">Cancel</button>
    </div>
  </div>`;
}

async function saveEdit(id) {
  const title = document.getElementById(`edit-title-${id}`).value.trim();
  const content = document.getElementById(`edit-content-${id}`).value.trim();
  if (!title || !content) return;
  await fetch(`${API}/notes/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content })
  });
  loadNotes();
}

// AI action
async function aiAction(id, action, btn) {
  const container = document.getElementById(`ai-${id}`);
  container.innerHTML = '<span class="spinner"></span>';
  const btns = btn.parentElement.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  try {
    const res = await fetch(`${API}/notes/${id}/ai/${action}`, { method: 'POST' });
    const data = await res.json();
    container.innerHTML = `<div class="ai-result"><h4>${data.action.replace('_', ' ')}</h4><pre>${esc(data.result)}</pre></div>`;
  } catch (e) {
    container.innerHTML = `<div class="ai-result"><h4>Error</h4><pre>${e.message}</pre></div>`;
  }
  btns.forEach(b => b.disabled = false);
}

loadNotes();
</script>
</body>
</html>
